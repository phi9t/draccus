[env]
DRACCUS_BUNDLE = "/data02/home/philip.yang/draccus"
UV_CACHE_DIR = "/opt/draccus/cache/uv"
HF_HOME = "/opt/draccus/cache/huggingface"
TORCH_CUDA_ARCH_LIST = "10.0"
PYTHONNOUSERSITE = "1"

[tasks.draccus-shell]
run = '''
/data02/home/philip.yang/draccus/bin/draccus-run bash -lc '
  . /opt/draccus/spack/share/spack/setup-env.sh
  spack env activate -p base-ml
  source .venv/bin/activate 2>/dev/null || true
  exec bash
'
'''

[tasks.draccus-venv]
run = '''
/data02/home/philip.yang/draccus/bin/draccus-run bash -lc '
  . /opt/draccus/spack/share/spack/setup-env.sh
  spack env activate -p base-ml
  uv venv --python "$(which python)" --system-site-packages .venv
'
'''

[tasks.draccus-validate]
run = '''
/data02/home/philip.yang/draccus/bin/draccus-run bash -lc '
  . /opt/draccus/spack/share/spack/setup-env.sh
  spack env activate -p base-ml
  source .venv/bin/activate 2>/dev/null || true
  python scripts/validate_foundation.py
'
'''

[tasks.draccus-lint]
description = "Gate 0: static analysis + structural checks (no GPU needed)"
run = "./scripts/validate-static.sh"

[tasks.draccus-check-all]
description = "Full 13-gate validation (requires NVIDIA B200 GPUs + built Spack)"
run = "./scripts/validate-all.sh"
